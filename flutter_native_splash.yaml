flutter_native_splash:
  # Solid dark navy background — no background_image needed since the logo
  # already contains the brand mark with proper padding
  color: "#0B1E36"
  color_dark: "#0B1E36"

  # Main splash logo (centered on screen)
  image: assets/icons/splash_logo.png
  image_dark: assets/icons/splash_logo.png

  fullscreen: false

  # Android 12+ uses a centered circular icon crop
  android_12:
    image: assets/icons/icon_1024.png
    icon_background_color: "#0B1E36"
    image_dark: assets/icons/icon_1024.png
    icon_background_color_dark: "#0B1E36"
    color: "#0B1E36"
    color_dark: "#0B1E36"
    branding: assets/images/splash_branding.png
    branding_dark: assets/images/splash_branding.png
    branding_bottom_padding: 24

  android: true
  ios: true
  web: false
