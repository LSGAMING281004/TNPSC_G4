name: thiral_app
description: Thiral — Tamil Nadu's #1 TNPSC Group 4 exam prep app. 10,000+ questions, AI study assistant, mock tests, and current affairs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.5.3

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2
  app_links: ^6.1.1

  # Network
  dio: ^5.7.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI Components
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.3
  flutter_staggered_animations: ^1.1.1
  animate_do: ^3.3.4

  # Auth
  google_sign_in: ^6.2.2

  # PDF
  flutter_pdfview: ^1.4.0
  path_provider: ^2.1.5

  # Notifications
  flutter_local_notifications: ^19.0.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  internet_connection_checker_plus: ^2.7.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  permission_handler: ^11.4.0
  speech_to_text: ^7.0.0
  connectivity_plus: ^6.1.4
  package_info_plus: ^8.2.1
  flutter_animate: ^4.5.2

  # Admin Panel
  data_table_2: ^2.7.2
  file_picker: ^11.0.2

  # Icons
  cupertino_icons: ^1.0.8
  flutter_vector_icons: ^2.0.0
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  google_generative_ai: ^0.4.7
  timezone: ^0.10.1
  csv: ^8.0.0
  # supabase_flutter removed — all file storage migrated to Firebase Storage
  flutter_native_splash: ^2.4.7
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.1
  image: ^4.3.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/achievements/
    - assets/icons/
    - assets/logos/
    - assets/lottie/
    - assets/fonts/
