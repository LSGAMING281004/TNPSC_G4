  <style>
    body {
      background-color: #0B1E36;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      transition: opacity 0.5s ease-out;
    }
    .logo-container {
      margin-bottom: 24px;
      animation: pulse 2s infinite ease-in-out;
    }
    .logo-img {
      width: 120px;
      height: 120px;
    }
    .app-title {
      color: #FFFFFF;
      font-size: 24px;
      font-weight: 700;

    }
    .app-subtitle {
      color: #F5C518;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin: 0 0 32px 0;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #F07020;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0% { transform: scale(1.0); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1.0); }
    }
  </style>

  <script>
    // Capture the PWA install prompt event
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
    });

    // Helper to trigger the PWA prompt from Dart
    window.triggerPwaPrompt = function() {
      if (window.deferredPrompt) {
        window.deferredPrompt.prompt();
        window.deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('User accepted the PWA install prompt');
          } else {
            console.log('User dismissed the PWA install prompt');
          }
          window.deferredPrompt = null;
        });
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // Fade out loading screen when Flutter is fully loaded and running
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-container');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(function() {
          loader.style.display = 'none';
        }, 500);
      }
    });
  </script>
